<div class=" px-2 py-2 flex items-center justify-between  rounded-md mx-[5px] mb-2 mt-1shadow-md">
  
  <div class="flex min-w-0">

    <div class="w-10 h-10 bg-[#203027] text-[#23a559] flex items-center justify-center rounded-lg mr-2">
          <svg xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="4" cy="20" r="2.5" fill="currentColor" stroke="none"/>
          <path d="M4 14a6 6 0 0 1 6 6"/>
          <path d="M4 8a12 12 0 0 1 12 12"/>
          <path d="M4 2a18 18 0 0 1 18 18"/>
        </svg>
    </div>

    <div class="flex flex-col">
      <div class="flex items-center gap-1.5 text-[#23a559]">
        <span class="text-[#23a559] text-[13px] font-bold truncate">Voz conectada</span>
      </div>
      <span class="text-[#949ba4] text-[11px] font-medium truncate hover:underline cursor-pointer ">
        {{ channelName }} / {{ serverName }}
      </span>
    </div>
  </div>
  

  <div class="flex">

    <div class="relative group flex items-center w-8 h-8 mx-2">
      <button  title="Desconectar" class="w-8 h-8 rounded-md hover:bg-[#5865F2] flex items-center justify-center group transition-colors text-white">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <rect x="3" y="10" width="2" height="4" rx="1"/>
          <rect x="7" y="7" width="2" height="10" rx="1"/>
          <rect x="11" y="4" width="2" height="16" rx="1"/>
          <rect x="15" y="7" width="2" height="10" rx="1"/>
          <rect x="19" y="10" width="2" height="4" rx="1"/>
        </svg>
      </button>
      <div class="absolute bottom-full left-[-63px] mb-2 px-3 py-1.5 text-base text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
        [class.opacity-0]="true"
        [class.group-hover:opacity-100]="!showSmallPanel">
        Supresion de ruido
        <div class="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-[#232428]"></div>
      </div>
      
    </div>

    <div class="relative group flex items-center w-8 h-8">

      <button (click)="onDisconnect.emit()" title="Desconectar" class="w-8 h-8 rounded-md hover:bg-red-700 flex items-center justify-center group transition-colors text-white">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
        </svg>
      </button>

      <div class="absolute bottom-full left-[-40px] mb-2 px-3 py-1.5 text-base text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
        [class.opacity-0]="true"
        [class.group-hover:opacity-100]="!showSmallPanel">
        Desconectar
        <div class="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-[#232428]"></div>
      </div>
    </div>

  </div>

  

</div>
