<div class="w-full h-full overflow-y-auto custom-scrollbar p-5 pt-4">
  
  <h2 class="text-[#b5bac1] text-[12px] font-bold mb-4 uppercase tracking-wide">
    Pendientes — {{ pendingRequests.length }}
  </h2>

  <div class="flex flex-col">
    
    @for (request of pendingRequests; track request.friendshipId) {
      <div class="flex items-center justify-between p-3 hover:bg-[#3f4147] rounded-lg border-t border-[#313338] hover:border-transparent transition-all group">
        
        <div class="flex items-center space-x-3">
          <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold text-sm">
            {{ request.requesterNickname?.charAt(0)?.toUpperCase() || '?' }}
          </div>
          <div class="flex flex-col leading-tight">
            <span class="text-[#f2f3f5] font-semibold text-[15px]">{{ request.requesterNickname }}</span>
            <span class="text-[#b5bac1] text-[13px]">Solicitud de amistad entrante</span>
          </div>
        </div>

        <div class="flex items-center space-x-2">
          
          <button (click)="acceptRequest(request.friendshipId!)" class="w-9 h-9 rounded-full bg-[#2b2d31] hover:bg-[#1e1f22] flex items-center justify-center text-[#b5bac1] hover:text-[#23a559] transition-colors shadow-sm" title="Aceptar">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8.99991 16.17L4.82991 12L3.40991 13.41L8.99991 19L20.9999 7L19.5899 5.59L8.99991 16.17Z"/>
            </svg>
          </button>
          
          <button class="w-9 h-9 rounded-full bg-[#2b2d31] hover:bg-[#1e1f22] flex items-center justify-center text-[#b5bac1] hover:text-[#fa777c] transition-colors shadow-sm" title="Ignorar">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z"/>
            </svg>
          </button>

        </div>
      </div>
    } @empty {
      <div class="flex flex-col items-center justify-center mt-20 text-[#949ba4]">
        <div class="w-[200px] h-[150px] bg-[#2b2d31] rounded-xl flex items-center justify-center mb-4 opacity-70">
           <svg class="w-16 h-16 text-[#404249]" fill="currentColor" viewBox="0 0 24 24">
             <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
           </svg>
        </div>
        <p class="text-[15px]">No hay solicitudes de amistad pendientes.</p>
      </div>
    }
    
  </div>
</div>
