<div class="flex h-full w-full bg-[#1E1F22] text-white">
  
  <app-dm-sidebar (onConversationSelect)="openChat($event)"></app-dm-sidebar>

  @if (currentView === 'FRIENDS') {
    <div class="flex-1 flex flex-col min-w-0">
      
      <div class="h-[48px] px-4 flex items-center justify-between shadow-sm border-b border-[#313338]">
        <div class="flex items-center space-x-4">
          <svg class="w-6 h-6 text-[#80848e]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C9.79 2 8 3.79 8 6s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 10c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span class="font-bold text-[15px] text-white">Amigos</span>
          
          <div class="w-[1px] h-6 bg-[#3f4147]"></div>
          
          <button (click)="setTab('ONLINE')" 
          [ngClass]="activeTab === 'ONLINE' ? 'bg-[#404249] text-white' : 'hover:bg-[#3f4147] text-[#b5bac1]'"
          class="px-2 py-1 rounded font-medium text-[15px] cursor-pointer transition-colors">
          En línea</button>

          <button (click)="setTab('ALL')"
          [ngClass]="activeTab === 'ALL' ? 'bg-[#404249] text-white' : 'hover:bg-[#3f4147] text-[#b5bac1]'"
          class="px-2 py-1 rounded font-medium text-[15px] transition-colors cursor-pointer">
          Todos</button>

          <button (click)="setTab('PENDING')"
          [ngClass]="activeTab === 'PENDING' ? 'bg-[#404249] text-white' : 'hover:bg-[#3f4147] text-[#b5bac1]'"
          class="px-2 py-1 rounded font-medium text-[15px] transition-colors cursor-pointer">
          Pendientes</button>

          <button (click)="setTab('ADD')"
          [ngClass]="activeTab === 'ADD' ? 'text-green-500 bg-transparent' : 'bg-[#248046] hover:bg-[#1a6334] text-white'"
          class="px-2 py-1 rounded font-medium text-[15px] transition-colors cursor-pointer">
          Añadir amigo</button>
        </div>
        <div class="h-full w-7 flex items-center justify-center " >
          <button (click)="openCreateDMModal()">
            <svg class ="w-6"viewBox="0 0 24 24" fill="#404249" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M22 5C22 6.65685 20.6569 8 19 8C17.3431 8 16 6.65685 16 5C16 3.34315 17.3431 2 19 2C20.6569 2 22 3.34315 22 5Z" fill="#b5bac1"></path> <path opacity="0.5" d="M15.2347 2.53476C14.2201 2.1881 13.132 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04346 16.4525C3.22094 16.8088 3.28001 17.2161 3.17712 17.6006L2.58151 19.8267C2.32295 20.793 3.20701 21.677 4.17335 21.4185L6.39938 20.8229C6.78393 20.72 7.19121 20.7791 7.54753 20.9565C8.88836 21.6244 10.4003 22 12 22C17.5228 22 22 17.5228 22 12C22 10.868 21.8119 9.77987 21.4652 8.76526C20.7572 9.22981 19.9101 9.5 19 9.5C16.5147 9.5 14.5 7.48528 14.5 5C14.5 4.08987 14.7702 3.24284 15.2347 2.53476Z" fill="#b5bac1"></path> </g></svg>
          </button>
        </div>
      </div>

      @switch (activeTab) {
        @case ('ONLINE') {
          <app-friends-online class="flex-1 overflow-hidden flex flex-col"></app-friends-online>
        }
        @case ('ALL') {
          <app-friends-all 
          (onOpenChat)="openChat($event)"
          class="flex-1 overflow-hidden flex flex-col"></app-friends-all>
        }
        @case ('PENDING') {
          <app-friends-pending class="flex-1 overflow-hidden flex flex-col"></app-friends-pending>
        }
        @case ('ADD') {
          <app-friend-add class="flex-1 overflow-hidden flex flex-col"></app-friend-add>
        }
      }

    </div>
  }

  @if (currentView === 'CHAT') {
  <app-chat-room 
    [conversationId]="activeConversationId!" 
    [friendName]="activeFriendName"
    (toClose)="openFriendsList()"
    class="flex-1 flex flex-col min-w-0 bg-[#313338]">
  </app-chat-room>
}


</div>
