<div class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center backdrop-blur-sm">
  <div class="bg-[#313338] w-[440px] rounded-md shadow-2xl flex flex-col animate-fade-in-up">
    
    <div class="p-4 pt-5 px-6">
      <div class="flex justify-between items-start mb-4">
        <h2 class="text-white text-[20px] font-bold leading-tight">Eliminar «{{ serverName }}»</h2>
        <svg (click)="closeModal()" tabindex="0" role="button"
        class="w-6 h-6 text-[#949ba4] hover:text-[#dbdee1] cursor-pointer flex-shrink-0 ml-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
      
      <div class="bg-[#e2a829]/10 rounded border border-[#e2a829]/30 p-3 mb-4">
        <p class="text-[#dbdee1] text-[15px] leading-relaxed">
          ¿Seguro que quieres eliminar <strong class="font-bold text-white">{{ serverName }}</strong>? Esta acción es irreversible.
        </p>
      </div>
    </div>

    <div class="px-6 pb-6">
      <span class="text-[#b5bac1] text-[12px] font-bold uppercase mb-2 block">
        Introduce el nombre del servidor
      </span>
      <div class="bg-[#1e1f22] rounded flex items-center px-3">
        <input type="text" 
               [(ngModel)]="confirmInput" 
               (keyup.enter)="onDeleteClick()"
               class="bg-transparent text-[#dbdee1] py-2.5 w-full focus:outline-none" 
               autocomplete="off">
      </div>
    </div>

    <div class="p-4 bg-[#2b2d31] rounded-b-md flex justify-end gap-3">
      <button (click)="closeModal()" class="text-white hover:underline text-sm font-medium px-6 py-2">
        Cancelar
      </button>
      <button (click)="onDeleteClick()" 
              [disabled]="!isMatch"
              class="bg-[#da373c] hover:bg-[#a12828] disabled:opacity-50 disabled:hover:bg-[#da373c] disabled:cursor-not-allowed text-white text-sm font-medium px-6 py-2 rounded transition-colors">
        Eliminar servidor
      </button>
    </div>
    
  </div>
</div>
