<div class="flex-1 flex items-center justify-between h-full pr-3 relative">
  
@if (isStatusMenuOpen) {
    <app-user-panel-pop-up 
      [username]="username"
      [currentStatus]="currentStatus"
      (statusSelected)="onStatusChange($event)">
    </app-user-panel-pop-up>
  }

  <div (click)="toggleStatusMenu()" class="flex items-center gap-2 hover:bg-[#3f4147] p-1 rounded-md cursor-pointer transition-colors flex-1 min-w-0 mr-2">
    
    <div class="relative w-8 h-8 rounded-full bg-[#5865F2] flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
      {{ username ? username.charAt(0).toUpperCase() : 'U' }}
      
      <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 border-[3px] border-[#232428] rounded-full transition-colors"
           [ngClass]="{
             'bg-[#23a559]': currentStatus === 'ONLINE',
             'bg-[#f0b232]': currentStatus === 'AWAY',
             'bg-[#f23f43]': currentStatus === 'DO_NOT_DISTURB',
             'bg-[#80848e]': currentStatus === 'OFFLINE'
           }">
      </div>
    </div>
    
    <div class="flex flex-col overflow-hidden flex-1 min-w-0">
      <span class="text-white text-sm font-bold truncate leading-none mb-1">{{ username }}</span>
      
      <span class="text-[#B5BAC1] text-[11px] truncate leading-none">
        {{ currentStatus === 'ONLINE' ? 'En línea' :
           currentStatus === 'AWAY' ? 'Ausente' :
           currentStatus === 'DO_NOT_DISTURB' ? 'No molestar' : 'Invisible' }}
      </span>
    </div>
  </div>

  <div class="flex items-center flex-shrink-0">

    <div class="h-[45px] w-[55px] flex items-center justify-center">

      <div class="h-[35px] w-[25px] flex items-center justify-center mx-1 hover:bg-[#3f4147] rounded-l">
        <button  
          class="relative group w-7 h-7 flex items-center justify-center rounded text-[#B5BAC1] hover:bg-[#3f4147] hover:text-[#F23F42]  focus:outline-none">
          
          <svg viewBox="-5 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:sketch="http://www.bohemiancoding.com/sketch/ns" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <defs> </defs> <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd" sketch:type="MSPage"> <g id="Icon-Set-Filled" sketch:type="MSLayerGroup" transform="translate(-107.000000, -309.000000)" fill="#B5BAC1"> <path d="M118,333 C121.866,333 125,329.866 125,326 L125,316 C125,312.134 121.866,309 118,309 C114.134,309 111,312.134 111,316 L111,326 C111,329.866 114.134,333 118,333 L118,333 Z M129,328 L127,328 C126.089,332.007 122.282,335 118,335 C113.718,335 109.911,332.007 109,328 L107,328 C107.883,332.799 112.063,336.51 117,336.955 L117,339 L116,339 C115.448,339 115,339.448 115,340 C115,340.553 115.448,341 116,341 L120,341 C120.552,341 121,340.553 121,340 C121,339.448 120.552,339 120,339 L119,339 L119,336.955 C123.937,336.51 128.117,332.799 129,328 L129,328 Z" id="microphone" sketch:type="MSShapeGroup"> </path> </g> </g> </g>
          </svg>


          <div class="absolute bottom-full mb-2 px-3 py-1.5 text-sm text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
              [class.opacity-0]="true"
              [class.group-hover:opacity-100]="!showSmallPanel">
              Silenciar
              <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-[#232428]"></div>
          </div>

        </button>        
      </div>

      <div class="h-[35px] w-[15px] flex items-center justify-center hover:bg-[#3f4147] rounded-r">
        <button 
        class=" relative group w-7 h-7 flex items-center justify-center rounded text-[#B5BAC1] hover:bg-[#3f4147] hover:text-[#F23F42]  focus:outline-none">
          
          <svg class="w-4 h-4 text-[#dbdee1] transition-transform duration-200 group-hover:text-white"  
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
          </svg>

          <div class="absolute bottom-full mb-2 px-3 py-1.5 text-sm text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
              [class.opacity-0]="true"
              [class.group-hover:opacity-100]="!showSmallPanel">
              Opciones de entrada
              <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-[#232428]"></div>
          </div>

        </button>
      </div>

    </div>

    <div class="h-[45px] w-[55px] flex items-center justify-center">
      <div class="h-[35px] w-[25px] flex items-center justify-center mx-1 hover:bg-[#3f4147] rounded-l">
        <button  
          class="relative group w-7 h-7 flex items-center justify-center rounded text-[#B5BAC1] hover:bg-[#3f4147] hover:text-[#F23F42]  focus:outline-none">
      
          <svg fill="#B5BAC1" viewBox="0 0 32 32" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;" version="1.1" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:serif="http://www.serif.com/" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M4.019,15.977l0,9.011c0,0.795 0.316,1.558 0.879,2.121c0.563,0.563 1.326,0.879 2.121,0.879c0.638,-0 1.343,-0 1.981,-0c0.796,-0 1.559,-0.316 2.121,-0.879c0.563,-0.563 0.879,-1.326 0.879,-2.121c0,-1.486 0,-3.503 -0,-4.988c0,-0.796 -0.316,-1.559 -0.879,-2.121c-0.562,-0.563 -1.325,-0.879 -2.121,-0.879l-2.981,0l0,-1.023c0,-5.497 4.456,-9.952 9.952,-9.952l0.077,-0c5.496,-0 9.952,4.455 9.952,9.952l0,1.011l-2.981,-0c-0.795,-0 -1.558,0.316 -2.121,0.878c-0.563,0.563 -0.879,1.326 -0.879,2.122c0,1.491 0,3.52 0,5.012c0,0.796 0.316,1.559 0.879,2.121c0.563,0.563 1.326,0.879 2.121,0.879c0.638,0 1.343,0 1.981,0c0.796,0 1.559,-0.316 2.121,-0.879c0.563,-0.562 0.879,-1.325 0.879,-2.121l0,-9.023c-0,-6.601 -5.351,-11.952 -11.952,-11.952l-0.077,-0c-6.601,-0 -11.952,5.351 -11.952,11.952Z"></path></g>
          </svg>

          <div class="absolute bottom-full mb-2 px-3 py-1.5 text-sm text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
              [class.opacity-0]="true"
              [class.group-hover:opacity-100]="!showSmallPanel">
              Ensordecer
              <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-[#232428]"></div>
            </div>

        </button>        
      </div>

      <div class="h-[35px] w-[15px] flex items-center justify-center hover:bg-[#3f4147] rounded-r">
        <button 
        class=" relative w-7 h-7 flex items-center justify-center rounded text-[#B5BAC1] hover:bg-[#3f4147] hover:text-[#F23F42] transition-colors group focus:outline-none">
            
          <svg class="w-4 h-4 text-[#dbdee1] transition-transform duration-200 group-hover:text-white"  
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
          </svg>

          <div class="absolute bottom-full mb-2 px-3 py-1.5 text-sm text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
              [class.opacity-0]="true"
              [class.group-hover:opacity-100]="!showSmallPanel">
              Opciones de salida
              <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-[#232428]"></div>
          </div>
        </button>
      </div>

    </div>    

    <div class="h-[45px] w-[45px] flex items-center justify-center">
      <button 
      class="relative w-7 h-7 flex items-center justify-center rounded text-[#B5BAC1] transition-colors group focus:outline-none"
        [class.pointer-events-none]="showSmallPanel"
        [class.opacity-50]="showSmallPanel"
        [class.hover:bg-[#3f4147]]="!showSmallPanel"
        (click)="openSettingsModal()">
          
        <svg viewBox="0 0 24 24" fill="#B5BAC1" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M20.1 9.2214C18.29 9.2214 17.55 7.9414 18.45 6.3714C18.97 5.4614 18.66 4.3014 17.75 3.7814L16.02 2.7914C15.23 2.3214 14.21 2.6014 13.74 3.3914L13.63 3.5814C12.73 5.1514 11.25 5.1514 10.34 3.5814L10.23 3.3914C9.78 2.6014 8.76 2.3214 7.97 2.7914L6.24 3.7814C5.33 4.3014 5.02 5.4714 5.54 6.3814C6.45 7.9414 5.71 9.2214 3.9 9.2214C2.86 9.2214 2 10.0714 2 11.1214V12.8814C2 13.9214 2.85 14.7814 3.9 14.7814C5.71 14.7814 6.45 16.0614 5.54 17.6314C5.02 18.5414 5.33 19.7014 6.24 20.2214L7.97 21.2114C8.76 21.6814 9.78 21.4014 10.25 20.6114L10.36 20.4214C11.26 18.8514 12.74 18.8514 13.65 20.4214L13.76 20.6114C14.23 21.4014 15.25 21.6814 16.04 21.2114L17.77 20.2214C18.68 19.7014 18.99 18.5314 18.47 17.6314C17.56 16.0614 18.3 14.7814 20.11 14.7814C21.15 14.7814 22.01 13.9314 22.01 12.8814V11.1214C22 10.0814 21.15 9.2214 20.1 9.2214ZM12 15.2514C10.21 15.2514 8.75 13.7914 8.75 12.0014C8.75 10.2114 10.21 8.7514 12 8.7514C13.79 8.7514 15.25 10.2114 15.25 12.0014C15.25 13.7914 13.79 15.2514 12 15.2514Z"></path> </g>
        </svg>
    
        <div class="absolute bottom-full mb-2 px-3 py-1.5 text-sm text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
          [class.opacity-0]="true"
          [class.group-hover:opacity-100]="!showSmallPanel">
          Ajustes de usuario
          <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-[#232428]"></div>
        </div>

      </button>
    </div>

    <div class="h-[45px] w-[45px] flex items-center justify-center">
      <button 
        (click)="$event.stopPropagation(); logout()" 
        class="relative w-7 h-7 flex items-center justify-center rounded text-[#B5BAC1] hover:bg-[#3f4147] hover:text-[#F23F42] transition-colors group focus:outline-none">
      
        <svg viewBox="0 0 24 24" fill="#B5BAC1" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier" > <path d="M22 6.62219V17.245C22 18.3579 21.2857 19.4708 20.1633 19.8754L15.0612 21.7977C14.7551 21.8988 14.449 22 14.0408 22C13.5306 22 12.9184 21.7977 12.4082 21.4942C12.2041 21.2918 11.898 21.0895 11.7959 20.8871H7.91837C6.38776 20.8871 5.06122 19.6731 5.06122 18.0544V17.0427C5.06122 16.638 5.36735 16.2333 5.87755 16.2333C6.38776 16.2333 6.69388 16.5368 6.69388 17.0427V18.0544C6.69388 18.7626 7.30612 19.2684 7.91837 19.2684H11.2857V4.69997H7.91837C7.20408 4.69997 6.69388 5.20582 6.69388 5.91401V6.9257C6.69388 7.33038 6.38776 7.73506 5.87755 7.73506C5.36735 7.73506 5.06122 7.33038 5.06122 6.9257V5.91401C5.06122 4.39646 6.28572 3.08125 7.91837 3.08125H11.7959C12 2.87891 12.2041 2.67657 12.4082 2.47423C13.2245 1.96838 14.1429 1.86721 15.0612 2.17072L20.1633 4.09295C21.1837 4.39646 22 5.50933 22 6.62219Z" fill="#B5BAC1"></path> <path d="M4.85714 14.8169C4.65306 14.8169 4.44898 14.7158 4.34694 14.6146L2.30612 12.5912C2.20408 12.49 2.20408 12.3889 2.10204 12.3889C2.10204 12.2877 2 12.1865 2 12.0854C2 11.9842 2 11.883 2.10204 11.7819C2.10204 11.6807 2.20408 11.5795 2.30612 11.5795L4.34694 9.55612C4.65306 9.25261 5.16327 9.25261 5.46939 9.55612C5.77551 9.85963 5.77551 10.3655 5.46939 10.669L4.7551 11.3772H8.93878C9.34694 11.3772 9.7551 11.6807 9.7551 12.1865C9.7551 12.6924 9.34694 12.7936 8.93878 12.7936H4.65306L5.36735 13.5017C5.67347 13.8052 5.67347 14.3111 5.36735 14.6146C5.26531 14.7158 5.06122 14.8169 4.85714 14.8169Z"></path> </g>
        </svg>

        <div class="absolute bottom-full mb-2 px-3 py-1.5 text-sm text-[#B5BAC1] bg-[#232428] border border-[#313338] rounded-lg shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
        [class.opacity-0]="true"
        [class.group-hover:opacity-100]="!showSmallPanel">
        Cerrar Sesion
        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-[#232428]"></div>
        </div>

      </button>
    </div>
    

  </div>

</div>
