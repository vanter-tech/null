<div class="w-[72px] h-full bg-[#1E1F22] flex-shrink-0 flex flex-col items-center py-3 gap-2 pt-3">
  
  <div class="group relative flex items-center justify-center w-full cursor-pointer">
    <div class="absolute left-0 w-1 h-10 bg-white rounded-r-lg opacity-100"></div>
    <div class="w-12 h-12 bg-[#5865F2] rounded-[16px] flex items-center justify-center text-white transition-all hover:bg-indigo-400">
      <img src="/null_logo_inverse.webp" alt="Mi App Logo" class="w-8 h-8 object-contain transition-transform duration-300 group-hover:scale-110" />
    </div>
  </div>

  <div class="w-8 h-[2px] bg-[#35363C] rounded-full my-1"></div>

  @for (server of servers; track server.id) {

    <div class="group relative flex items-center justify-center w-full cursor-pointer mt-2">
      <div class="absolute left-0 w-1 bg-white rounded-r-lg opacity-0 transition-all duration-300 h-2 group-hover:opacity-100 group-hover:h-5"></div>
      
      <div class="w-12 h-12 bg-[#313338] text-[#DBDEE1] group-hover:text-white rounded-[24px] group-hover:rounded-[16px] group-hover:bg-[#5865F2] transition-all duration-300 flex items-center justify-center font-semibold text-[18px] relative shadow-sm">
        
        {{ server.name?.charAt(0) | uppercase }}

        <div class="absolute -bottom-1 -right-1 bg-[#F23F42] border-[4px] border-[#1E1F22] text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[20px] text-center flex items-center justify-center">
          2
        </div>

      </div>

      <div class="absolute left-[74px] bg-[#111214] text-[#DBDEE1] text-[15px] font-bold px-3 py-1.5 rounded-[6px] shadow-xl whitespace-nowrap opacity-0 scale-95 group-hover:opacity-100 group-hover:scale-100 transition-all duration-200 pointer-events-none z-50 flex items-center">
        <div class="absolute -left-1 w-2.5 h-2.5 bg-[#111214] rotate-45 rounded-sm"></div>
        <span class="relative z-10">{{ server.name }}</span>
      </div>

    </div>
  }

  <div class="w-8 h-[2px] bg-[#35363C] rounded-full my-2"></div>

  <div (click)="openModal()" class="group relative flex items-center justify-center w-full cursor-pointer">
    <div class="absolute left-0 w-1 bg-white rounded-r-lg opacity-0 transition-all duration-300 h-2 group-hover:opacity-100 group-hover:h-5"></div>
    <div class="w-12 h-12 bg-[#313338] text-[#23A559] group-hover:bg-[#23A559] group-hover:text-white rounded-[24px] group-hover:rounded-[16px] transition-all duration-300 flex items-center justify-center text-2xl font-light">
      +
    </div>
  </div>
    
  <div class="group relative flex items-center justify-center w-full cursor-pointer mt-2">
    <div class="absolute left-0 w-1 bg-white rounded-r-lg opacity-0 transition-all duration-300 h-2 group-hover:opacity-100 group-hover:h-5"></div>
    <div class="w-12 h-12 bg-[#313338] text-[#23A559] group-hover:bg-[#23A559] group-hover:text-white rounded-[24px] group-hover:rounded-[16px] transition-all duration-300 flex items-center justify-center">
      
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19zM12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1z"/>
      </svg>

    </div>
  </div>

</div>

@if (isModalOpen) {
  <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    
    <div class="bg-[#313338] rounded-[16px] w-[440px] shadow-xl overflow-hidden text-center flex flex-col">
      
      <div class="p-6 pb-4">
        <h2 class="text-white text-2xl font-bold mb-2">Crea tu servidor</h2>
        <p class="text-[#B5BAC1] text-[15px]">Su servidor es donde usted y sus amigos pasan el rato. Cree el suyo y comience a hablar.</p>
      </div>

      <div class="px-6 pb-6 text-left">
        
        <label class="text-[#B5BAC1] text-xs font-bold uppercase mb-2 block tracking-wide">
          Nombre del servidor <span class="text-red-500">*</span>
        </label>
        <input 
          type="text" 
          [(ngModel)]="serverNameInput"
          class="w-full bg-[#1E1F22] text-white rounded p-2.5 mb-4 focus:outline-none focus:ring-1 focus:ring-[#5865F2] transition-all"
          placeholder="Servidor de Prueba"
        />

        <label class="text-[#B5BAC1] text-xs font-bold uppercase mb-2 block tracking-wide">
          URL de la Imagen (Opcional)
        </label>
        <input 
          type="text" 
          [(ngModel)]="serverImageInput"
          class="w-full bg-[#1E1F22] text-white rounded p-2.5 mb-2 focus:outline-none focus:ring-1 focus:ring-[#5865F2] transition-all"
          placeholder="https://ejemplo.com/imagen.png"
        />
      </div>

      <div class="bg-[#2B2D31] p-4 flex justify-between items-center px-6">
        <button (click)="closeModal()" class="text-white text-sm font-medium hover:underline focus:outline-none">
          Atrás
        </button>
        <button 
          (click)="createServer()" 
          [disabled]="!serverNameInput.trim()"
          class="bg-[#5865F2] text-white text-sm font-medium px-6 py-2.5 rounded hover:bg-[#4752C4] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          Crear
        </button>
      </div>

    </div>
  </div>
}
