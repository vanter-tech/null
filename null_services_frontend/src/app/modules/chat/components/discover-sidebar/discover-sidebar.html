<div class="w-[240px] bg-[#2B2D31] flex-shrink-0 flex flex-col h-full">
  
  <div class="p-4 pt-6">
    <h2 class="text-[24px] font-extrabold text-white mb-4 px-2 tracking-wide">Descubrir</h2>
    
    <nav class="flex flex-col gap-0.5 mt-2">
      
      <div 
        (click)="setActiveTab('servers')"
        [ngClass]="activeTab === 'servers' ? 'bg-[#404249] text-white' : 'text-[#B5BAC1] hover:bg-[#35373C] hover:text-[#DBDEE1]'"
        class="flex items-center px-3 py-2.5 rounded cursor-pointer transition-colors font-medium">
        
        <svg class="w-6 h-6 mr-3" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19zM12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1z"/>
        </svg>
        Servidores
      </div>

      <div 
        (click)="setActiveTab('apps')"
        [ngClass]="activeTab === 'apps' ? 'bg-[#404249] text-white' : 'text-[#B5BAC1] hover:bg-[#35373C] hover:text-[#DBDEE1]'"
        class="flex items-center px-3 py-2.5 rounded cursor-pointer transition-colors font-medium">
        
        <svg class="w-6 h-6 mr-3" fill="currentColor" viewBox="0 0 24 24">
          <path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z"/>
        </svg>
        Aplicaciones
      </div>

      <div 
        (click)="setActiveTab('quests')"
        [ngClass]="activeTab === 'quests' ? 'bg-[#404249] text-white' : 'text-[#B5BAC1] hover:bg-[#35373C] hover:text-[#DBDEE1]'"
        class="flex items-center px-3 py-2.5 rounded cursor-pointer transition-colors font-medium">
        
        <svg class="w-6 h-6 mr-3" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-10-5v2.5l10 5 10-5V9.5l-10 5zm0 5l-10-5v2.5l10 5 10-5v-2.5l-10 5z"/>
        </svg>
        Misiones
      </div>

    </nav>
  </div>
</div>
