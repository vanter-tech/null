<div class="fixed inset-0 z-40 " (click)="close.emit()"></div>

<div class="fixed right-[240px]  z-50 w-[340px] bg-[#111214] rounded-lg shadow-2xl overflow-hidden border border-[#1e1f22]" [style.top.px]="topPosition" (click)="$event.stopPropagation()">
  
  <div class="h-[120px] w-full bg-[#bfa894]"></div> 

  <div class="px-4 pb-4 relative">
    
    <div class="absolute -top-[50px] left-4 rounded-full border-[6px] border-[#111214] bg-[#111214] w-[92px] h-[92px] flex justify-center items-center">
      @if (member.imageUrl) {
        <img [src]="member.imageUrl" alt="Avatar" class="rounded-full object-cover w-full h-full">
      } @else {
        <div class="w-full h-full rounded-full bg-indigo-500 flex items-center justify-center text-white text-3xl font-bold">
          {{ member.username?.charAt(0) | uppercase }}
        </div>
      }
      <div class="absolute bottom-0 right-0 w-6 h-6 bg-[#f0b232] rounded-full border-[4px] border-[#111214]"></div>
    </div>

    <div class="h-14 w-full"></div>

    <div class="bg-[#111214] text-white mt-2">
      <h2 class="text-[20px] font-bold leading-tight">{{ member.username }}</h2>
      <p class="text-sm text-[#dbdee1] mb-4">_awayfromkeyboard</p> 

      <div class="w-full h-[1px] bg-[#2B2D31] my-3"></div>

      <h3 class="text-[14px] text-[#dbdee1] leading-snug mb-4">Estoy AFK ✈️</h3>

      <div class="flex items-center gap-1 mb-4">
        <button class="flex items-center gap-1 bg-[#2b2d31] hover:bg-[#3f4147] px-2 py-1 rounded text-xs text-[#dbdee1] font-medium transition-colors">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Añadir rol
        </button>
      </div>

      <div class="bg-[#383a40] rounded flex items-center px-3 py-2 w-full mt-2">
        <input type="text" [placeholder]="'Enviar mensaje a @' + member.username" class="flex-1 bg-transparent text-[#dbdee1] outline-none text-[13px] placeholder-[#87898c]">
      </div>
    </div>
  </div>
</div>
